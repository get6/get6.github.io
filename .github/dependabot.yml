version: 2

# Policy: ittae workspace policies/dependabot-pr-lanes.md
# Lane A only: minor/patch version-updates. Majors → Multica/human (never auto-merge).
# Security updates may still open majors — treat as lane C (human review).

updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "automerge-candidate"
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
      day: monday
      time: "09:00"
      timezone: Asia/Seoul
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "automerge-candidate"
    groups:
      gha-minor-and-patch:
        applies-to: version-updates
        update-types: ["minor", "patch"]
